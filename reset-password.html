<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 420px;
      margin: 60px auto;
      background: #fff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h2 {
      margin-top: 0;
      text-align: center;
    }
    p {
      color: #555;
      text-align: center;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      background: #222;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reset Password</h2>
    <p>Enter your new password</p>

    <form id="resetForm">
      <input id="password" type="password" placeholder="New password" required />
      <input id="confirmPassword" type="password" placeholder="Confirm password" required />
      <button id="submitBtn" type="submit">Reset Password</button>
    </form>

    <div id="message" class="msg"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    const form = document.getElementById("resetForm");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const message = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");

    // حط هنا رابط Strapi الحقيقي
    const API_URL = "https://motivated-fitness-95fac0701a.strapiapp.com/api/auth/reset-password";

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "msg " + type;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const password = passwordInput.value.trim();
      const passwordConfirmation = confirmPasswordInput.value.trim();

      if (!code) {
        showMessage("Reset code is missing from the link.", "error");
        return;
      }

      if (!password || !passwordConfirmation) {
        showMessage("Please fill in all fields.", "error");
        return;
      }

      if (password.length < 6) {
        showMessage("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== passwordConfirmation) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      submitBtn.disabled = true;
      showMessage("Please wait...", "success");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            code,
            password,
            passwordConfirmation
          })
        });

        const data = await response.json();

        if (!response.ok) {
          const errMsg =
            data?.error?.message ||
            data?.message ||
            "Failed to reset password.";
          throw new Error(errMsg);
        }

        showMessage("Password reset successfully. You can now return to the app and sign in.", "success");
        form.reset();
      } catch (err) {
        showMessage(err.message || "Something went wrong.", "error");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
