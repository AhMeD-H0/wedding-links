<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Open Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    if (code) {
      const encodedCode = encodeURIComponent(code);

      const intentLink =
        `intent://reset-password?code=${encodedCode}` +
        `#Intent;scheme=weddingapp;package=com.example.wedding_app;end`;

      window.location.href = intentLink;

      setTimeout(() => {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.example.wedding_app";
      }, 2000);
    }
  </script>
</head>
<body>
  <p style="text-align:center;margin-top:40px">
    جاري فتح صفحة تغيير كلمة المرور…
  </p>
</body>
</html>
